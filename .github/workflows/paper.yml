name: paper

on: [push]

jobs:
  build-paper:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-plain-generic

      - name: Build paper
        run: |
          pandoc paper.md -o paper.pdf
